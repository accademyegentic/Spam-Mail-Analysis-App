name: Build and Deploy — MailPulse Analytics v2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # Sets the Vite base path to /<repo-name>/ so all assets resolve
          # correctly when hosted on GitHub Pages (username.github.io/<repo>/)
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Add .nojekyll to disable Jekyll processing
        run: touch ./dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
